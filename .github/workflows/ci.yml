name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
          cache: true

      - name: Run Vet
        run: go vet ./...

      - name: Run Tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Run Build Check
        run: ./scripts/build-release.sh
